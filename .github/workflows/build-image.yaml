name: "_PROJECT_NAME_ - Build Image"

on:
  # trigger build 1
  workflow_dispatch:
  # push:
  #   paths:
  #     - '!frontend/**'
  #     - '!kubernetes/**'

env:
  region: eu-central-1
  accountId: "557143635936"
  repo: app/_PROJECT_NAME_


jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Set IMAGE_TAG as env
        run: |
          IMAGE_TAG=$(git rev-parse --short=7 ${{ github.sha }})
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.region }}
          mask-aws-account-id: 'no'

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: _PROJECT_NAME_ - build + push
        id: docker_build__PROJECT_NAME_
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          tags: ${{ env.accountId }}.dkr.ecr.${{ env.region }}.amazonaws.com/${{ env.repo }}:latest,${{ env.accountId }}.dkr.ecr.${{ env.region }}.amazonaws.com/${{ env.repo }}:${{ env.IMAGE_TAG }}
          labels: _PROJECT_NAME_
          platforms: linux/amd64
          # offx linux/arm64

      - name: job summary
        run: |-
          (
          echo "# IMAGE";
          echo;
          echo '_PROJECT_NAME_: latest'
          echo '_PROJECT_NAME_ SHA: `'${{ steps.docker_build__PROJECT_NAME_.outputs.imageid }}'`'

          ) | tee -a $GITHUB_STEP_SUMMARY

